name: Release

on:
  schedule:
    # Check hourly whether the latest non-retired version published to
    # Hex.pm has a corresponding git tag yet, and create one if its
    # version-bump commit is at least MIN_AGE_HOURS old (see env below).
    # The age check gives room for amended re-publishes of the same version
    # on Hex.pm before it gets tagged.
    - cron: "0 * * * *"

env:
  # Minimum age (in hours) of a version-bump commit before it gets tagged.
  # Gives room for amended re-publishes of the same version on Hex.pm.
  MIN_AGE_HOURS: 1

jobs:
  detect:
    name: Detect latest hex.pm release
    runs-on: ubuntu-latest
    outputs:
      should_tag: ${{ steps.resolve.outputs.should_tag }}
      version:    ${{ steps.resolve.outputs.version }}
      commit:     ${{ steps.resolve.outputs.commit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release version
        id: resolve
        run: |
          # Check whether the latest version published to Hex.pm already has
          # a matching git tag; if not, create one.
          APP="erlexec"

          # Releases are returned newest-first — pick the latest non-retired one.
          PUBLISHED=$(curl -fsS "https://hex.pm/api/packages/$APP" | \
                      jq -r '.releases[].version' | \
                      while read vsn; do \
                        RETIRED=$(curl -fsS "https://hex.pm/api/packages/$APP/releases/$vsn" | \
                        jq -r '.retirement.reason'); \
                        if [ "$RETIRED" = "null" ]; then echo "$vsn"; break; fi; \
                      done)

          if [ -z "$PUBLISHED" ]; then
            echo "Could not determine latest published (non-retired) version, skipping"
            echo "should_tag=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git tag -l "$PUBLISHED" | grep -q .; then
            echo "Tag $PUBLISHED already exists, skipping"
            echo "should_tag=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the commit that introduced this version in erlexec.app.src.
          COMMIT=$(git log --format='%H' -- src/erlexec.app.src | \
                   while read sha; do \
                     VER=$(git show "$sha:src/erlexec.app.src" | sed -nE '/\{vsn/{s/.*\{vsn,\s*"([^"]+)".*/\1/p; q}'); \
                     if [ "$VER" = "$PUBLISHED" ]; then echo $sha; break; fi; \
                   done)

          if [ -z "$COMMIT" ]; then
            echo "No commit on main introduces version $PUBLISHED, skipping"
            echo "should_tag=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Only tag once the version-bump commit is at least MIN_AGE_HOURS old,
          # to allow several amended Hex.pm releases of the same version before
          # it gets tagged.
          COMMIT_TS=$(git show -s --format=%ct "$COMMIT")
          NOW_TS=$(date +%s)
          AGE=$((NOW_TS - COMMIT_TS))
          MIN_AGE=$((MIN_AGE_HOURS * 3600))

          if [ "$AGE" -lt "$MIN_AGE" ]; then
            echo "Commit $COMMIT for version $PUBLISHED is only $((AGE / 60)) minutes old, waiting for $((MIN_AGE / 3600)) hours"
            echo "should_tag=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found an untagged release in hex.pm for version $PUBLISHED (commit $COMMIT)"
          echo "version=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT"     >> $GITHUB_OUTPUT
          echo "should_tag=true"    >> $GITHUB_OUTPUT

  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.should_tag == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Don't let checkout persist its own GITHUB_TOKEN credential helper —
          # it conflicts with (and wins over) the RELEASE_PAT we embed in the
          # push URL below, causing the push to authenticate as
          # github-actions[bot] (which lacks permission) instead of RELEASE_PAT.
          persist-credentials: false

      - name: Create and push tag ${{ needs.detect.outputs.version }}
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          COMMIT="${{ needs.detect.outputs.commit }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REMOTE="https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"

          git tag "$VERSION" "$COMMIT"
          git push "$REMOTE" "$VERSION"
          echo "### :label: Created tag \`$VERSION\` at \`$(git rev-parse --short "$COMMIT")\`" >> $GITHUB_STEP_SUMMARY

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [detect, create-tag]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.commit }}

      - name: Get changelog entry
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION="${{ needs.detect.outputs.version }}"
          # Look for the version in CHANGELOG.md or fall back to generated notes
          if [ -f "CHANGELOG.md" ]; then
            # Extract section between version header and next version header
            awk "/^## ${VERSION#v}/{flag=1;next}/^## v[0-9]/{flag=0}flag" CHANGELOG.md > changelog.txt
            if [ -s changelog.txt ]; then
              echo "has_changelog=true" >> $GITHUB_OUTPUT
            else
              echo "has_changelog=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changelog=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Github Release ${{ needs.detect.outputs.version }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.detect.outputs.version }}
          body_path: ${{ steps.changelog.outputs.has_changelog == 'true' && 'changelog.txt' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.has_changelog != 'true' }}
          draft: false
          prerelease: ${{ contains(needs.detect.outputs.version, 'alpha') || contains(needs.detect.outputs.version, 'beta') || contains(needs.detect.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
