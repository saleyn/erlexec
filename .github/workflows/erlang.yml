name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  linux:
    runs-on: ubuntu-latest
    name: OTP ${{ matrix.otp }} ${{ matrix.os }}.${{ matrix.compiler.compiler }}

    container:
      image: erlang:${{matrix.otp}}

    strategy:
      matrix:
        os: [ linux ]
        compiler:
          - { compiler: GNU-14,  CC: gcc-14,      CXX: g++-14 }
          - { compiler: GNU-12,  CC: gcc-12,      CXX: g++-12 }
          - { compiler: LLVM-18, CC: clang-18,    CXX: clang++-18 }
          - { compiler: LLVM-16, CC: clang-16,    CXX: clang++-16 }
        otp: [27, 28]
        exclude:
          # GCC 14 and clang 18 are only available in OTP 28 (Debian Bookworm+)
          - { otp: 27, compiler: { compiler: GNU-14 } }
          - { otp: 27, compiler: { compiler: LLVM-18 } }
          # GCC 12 and clang 16 are available in OTP 27 (Debian Bookworm)
          - { otp: 28, compiler: { compiler: GNU-12 } }
          - { otp: 28, compiler: { compiler: LLVM-16 } }

    steps:
      - uses: actions/checkout@v2
      - name: OTP Version
        run:  erl -eval '{ok, Version} = file:read_file(filename:join([code:root_dir(), "releases", erlang:system_info(otp_release), "OTP_VERSION"])), io:format("Version=~s\n", [Version]), halt().' -noshell -noinput;
      - name: Fix Ownership
        run:  git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - name: Install compiler
        run:  |
          apt-get update -qq
          apt-get install -y --no-install-recommends ${{ matrix.compiler.CC }} ${{ matrix.compiler.CXX }}
      - name: Build
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  |
          make info
          make
      - name: Test
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  |
          adduser --disabled-password --gecos '' newuser
          chown -R newuser:newuser .
          su -c "make test" newuser

  macOS:
    name: OTP ${{ matrix.otp }} macos.${{ matrix.compiler.compiler }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { compiler: XCode, CC: cc, CXX: c++ }
        otp: [27, 28]
    steps:
      - uses: actions/checkout@v2
      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3'
      - name: OTP Version
        run:  erl -eval '{ok, Version} = file:read_file(filename:join([code:root_dir(), "releases", erlang:system_info(otp_release), "OTP_VERSION"])), io:format("Version=~s\n", [Version]), halt().' -noshell -noinput;
      - name: Fix Ownership
        run:  git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - name: Build
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  |
          make info
          make
      - name: Test
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  make test

